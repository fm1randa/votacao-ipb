{{define "mesatoast"}}
<div id="toast-root"></div>
<script>
  // Toast disparado pelo header HX-Trigger das ações (ADR-0008).
  document.body.addEventListener('toast', function(e){
    var d = e.detail || {}; if (typeof d === 'string') d = { msg: d };
    var t = document.createElement('div'); t.className = 'toast';
    var s = document.createElement('span'); s.textContent = d.msg || 'Pronto.'; t.appendChild(s);
    if (d.undo) {
      var b = document.createElement('button'); b.type = 'button'; b.textContent = 'Desfazer';
      b.addEventListener('click', function(){ if (window.htmx) htmx.ajax('POST', '/board/undo', { swap: 'none' }); t.remove(); });
      t.appendChild(b);
    }
    document.getElementById('toast-root').appendChild(t);
    setTimeout(function(){ t.remove(); }, 7000);
  });
</script>
{{end}}
